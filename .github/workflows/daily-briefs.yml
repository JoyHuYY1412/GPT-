name: Daily Briefs

on:
  schedule:
    # 01:30 Asia/Taipei = 17:30 UTC on the previous day
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-daily-briefs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily Markdown briefs
        run: python scripts/generate_daily_briefs.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated briefs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-briefs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily briefs for $(TZ=Asia/Taipei date +'%Y-%m-%d')"
            git push
          fi

      - name: Send Feishu notification
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          webhook = os.environ.get("FEISHU_WEBHOOK", "").strip()
          if not webhook:
              print("FEISHU_WEBHOOK is not set. Skip Feishu notification.")
              raise SystemExit(0)

          repo = os.environ.get("REPO", "JoyHuYY1412/GPT-")
          branch = os.environ.get("BRANCH", "main")
          today = datetime.now(ZoneInfo("Asia/Taipei")).date().isoformat()
          base = f"https://github.com/{repo}/blob/{branch}"
          links = [
              ("每日 arXiv 论文雷达", f"{base}/daily-briefs/paper-radar/{today}.md"),
              ("学术圈地图", f"{base}/daily-briefs/academic-map/{today}.md"),
              ("相关论文项目雷达", f"{base}/daily-briefs/related_paper-radar/{today}.md"),
          ]
          text = "\n".join([
              f"📚 Daily Briefs 已更新｜{today}",
              "",
              *[f"- {name}: {url}" for name, url in links],
              "",
              "Repo: https://github.com/" + repo,
              "",
              "🔄 如果今天研究兴趣有变化，记得回到 GPT 里说：同步今天兴趣。没同步也没关系，系统会按历史兴趣继续推送。",
          ])
          payload = {
              "msg_type": "text",
              "content": {"text": text},
          }
          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              print(resp.read().decode("utf-8", errors="ignore"))
          PY
