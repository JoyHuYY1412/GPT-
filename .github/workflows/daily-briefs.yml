name: Daily Briefs

on:
  schedule:
    # 01:30 Asia/Taipei = 17:30 UTC on the previous day
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-daily-briefs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily Markdown briefs
        run: python scripts/generate_daily_briefs.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated briefs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-briefs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily briefs for $(TZ=Asia/Taipei date +'%Y-%m-%d')"
            git push
          fi
