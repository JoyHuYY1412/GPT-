name: Test Feishu Notification

on:
  workflow_dispatch:
  push:
    paths:
      - docs/feishu_push_test.md

permissions:
  contents: write

jobs:
  test-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Feishu test notification and record result
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          result_path = Path("docs/feishu_test_result.md")
          result_path.parent.mkdir(parents=True, exist_ok=True)

          now = datetime.now(ZoneInfo("Asia/Taipei")).strftime("%Y-%m-%d %H:%M:%S")
          repo = os.environ.get("REPO", "JoyHuYY1412/GPT-")
          sha = os.environ.get("SHA", "")[:7]
          webhook = os.environ.get("FEISHU_WEBHOOK", "").strip()

          status_lines = [
              "# Feishu Test Result",
              "",
              f"- Time: {now} Asia/Taipei",
              f"- Repo: {repo}",
              f"- Commit: {sha}",
              f"- FEISHU_WEBHOOK configured: {'yes' if webhook else 'no'}",
          ]

          if not webhook:
              status_lines += ["", "## Result", "", "FAILED: `FEISHU_WEBHOOK` is empty or not available to this workflow."]
              result_path.write_text("\n".join(status_lines) + "\n", encoding="utf-8")
              raise SystemExit(0)

          # Include likely keywords in case the Feishu bot enabled keyword verification.
          text = "\n".join([
              "✅ Daily Briefs 飞书推送测试成功",
              "关键词: Daily Briefs / GPT / 论文雷达",
              f"时间: {now} Asia/Taipei",
              f"Repo: https://github.com/{repo}",
              f"Commit: {sha}",
              "",
              "后续 Daily Briefs 会在每天生成 Markdown 后，把三份文件链接推送到这个飞书群。",
          ])
          payload = {"msg_type": "text", "content": {"text": text}}
          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = resp.read().decode("utf-8", errors="ignore")
                  http_status = resp.status
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="ignore")
              http_status = e.code
          except Exception as e:
              body = repr(e)
              http_status = "exception"

          status_lines += [
              "",
              "## Result",
              "",
              f"- HTTP status: `{http_status}`",
              "- Raw response:",
              "",
              "```json",
              body,
              "```",
          ]
          result_path.write_text("\n".join(status_lines) + "\n", encoding="utf-8")
          PY

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feishu_test_result.md
          if git diff --cached --quiet; then
            echo "No diagnostic changes to commit."
          else
            git commit -m "Record Feishu test result"
            git push
          fi
